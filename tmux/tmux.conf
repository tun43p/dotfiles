# Replace default prefix (C-b) with C-Space
set -g prefix C-Space
bind C-Space send-prefix
unbind C-b

# Enable mouse support (scroll, click on panes/windows)
set -g mouse on

# Allow copying to system clipboard
set -g set-clipboard on

# 256 colors + TrueColor support
set -ga terminal-overrides ",tmux-256color:Tc"
set -g default-terminal "tmux-256color"

# Auto-resize when multiple clients have different terminal sizes
set -g aggressive-resize on

# Remove Escape key delay (critical for Vim/Neovim)
set -s escape-time 0

# Scrollback buffer size per pane
set -g history-limit 50000

# How long tmux messages are shown (e.g. "Config reloaded")
set -g display-time 1500

# Forward focus events to the application inside the pane (needed by Neovim)
set -g focus-events on

# Auto-rename windows based on current process (zsh, nvim, git, etc.)
setw -g automatic-rename on

# Prevent the shell from overriding the window name via escape sequences
set-window-option -g allow-rename off

# Start indexes at 1 (more natural on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically after closing one
set -g renumber-windows on

# Do not kill the session when the last pane/window is closed
# Allows clean detach and returning later via: t <session>
set -g detach-on-destroy off

# Disable activity notifications
setw -g monitor-activity off
set -g visual-activity off

# Status bar at the top
set -g status-position top

# Refresh every second (for the clock)
set -g status-interval 1
set -g status-justify left

# Transparent background (inherits terminal background)
set -g status-bg default
set -g status-fg default
set -g status-style fg=white,bg=default

# Left side: session name + git branch of active pane
set -g status-left '#[fg=cyan,bold]#S #[fg=white,nobold]⎇ #(git -C #{pane_current_path} branch --show-current 2>/dev/null)  '
set -g status-left-length 60

# Right side: time
set -g status-right '#[fg=white,dim]%H:%M'
set -g status-right-length 10

# Window tab format: inactive
set -g window-status-format '#[fg=white,dim] #I:#W '

# Window tab format: active (bold, no background)
set -g window-status-current-format '#[fg=white,bold] *#I:#W '
set -g window-status-current-style ''

# Highlight tab in yellow when activity is detected
set -g window-status-activity-style fg=yellow

# Show pane index + running command at the top of each pane
set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command}"
set -g pane-border-style fg=green
set -g pane-active-border-style fg=blue

# Detach cleanly (session stays alive, return later with: t <session>)
bind-key q detach-client

# Unbind split and new window bindings
unbind '"'
unbind %
unbind v
unbind b

# Split in current directory
bind-key v split-window -h -c '#{pane_current_path}'
bind-key b split-window -v -c '#{pane_current_path}'

# New window in current directory
bind-key c new-window -c '#{pane_current_path}'

# Unbind arrow and vim-style bindings
unbind Left
unbind Down
unbind Up
unbind Right
unbind h
unbind j
unbind k
unbind l

# Navigate between panes (vim-style + arrows)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R

# Resize panes (-r = repeatable without pressing prefix again)
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5
bind-key -r C-Left resize-pane -L 5
bind-key -r C-Down resize-pane -D 5
bind-key -r C-Up resize-pane -U 5
bind-key -r C-Right resize-pane -R 5

# Reload config live
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"
