set -g prefix C-Space
bind C-Space send-prefix
unbind C-b

set -g mouse on
set -g set-clipboard on

set -ga terminal-overrides ",tmux-256color:Tc"
set -g default-terminal "tmux-256color"

set -g aggressive-resize on
set -s escape-time 0
set -g history-limit 50000
set -g display-time 1500
set -g focus-events on
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep session alive when closing windows/panes
set -g detach-on-destroy off

setw -g monitor-activity off
set -g visual-activity off

# Status bar on top
set -g status-position top
set -g status-interval 1
set -g status-justify left

set -g status-style fg=black,bg=green
set -g status-left '#[fg=black,bg=blue,bold] #S #[fg=blue,bg=green,nobold]'
set -g status-left-length 30
set -g status-right '#[fg=black]%H:%M  #[bold]#{pane_index}'
set -g status-right-length 20

set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[fg=black,bg=blue,bold] #I:#W #[fg=blue,bg=green,nobold]'
set -g window-status-current-style ''
set -g window-status-activity-style fg=yellow

set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command}"
set -g pane-border-style fg=green
set -g pane-active-border-style fg=blue

# Detach without killing
bind-key q detach-client

# Splits
unbind '"'
unbind %
unbind v
unbind b
bind-key v split-window -h -c '#{pane_current_path}'
bind-key b split-window -v -c '#{pane_current_path}'

# New window in current path
bind-key c new-window -c '#{pane_current_path}'

# Pane navigation
unbind Left
unbind Down
unbind Up
unbind Right
unbind h
unbind j
unbind k
unbind l

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R

# Pane resize
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

bind-key -r C-Left resize-pane -L 5
bind-key -r C-Down resize-pane -D 5
bind-key -r C-Up resize-pane -U 5
bind-key -r C-Right resize-pane -R 5

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"
