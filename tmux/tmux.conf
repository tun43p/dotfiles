# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Replace default prefix (C-b) with C-Space
set -g prefix C-Space
bind C-Space send-prefix
unbind C-b

# Enable mouse support (scroll, click on panes/windows)
set -g mouse on

# Allow copying to system clipboard
set -g set-clipboard on

# 256 colors + TrueColor support
set -ga terminal-overrides ",tmux-256color:Tc"
set -g default-terminal "tmux-256color"

# Left: session name (always visible, tpipeline overrides when in neovim)
set -g status-left '#[fg=cyan,bold]#S  '
set -g status-left-length 99

# Right: time (always visible, tpipeline overrides when in neovim)
set -g status-right '#[fg=white,dim]%H:%M'
set -g status-right-length 99

# Auto-resize when multiple clients have different terminal sizes
set -g aggressive-resize on

# Remove Escape key delay (critical for Vim/Neovim)
set -s escape-time 0

# Scrollback buffer size per pane
set -g history-limit 50000

# How long tmux messages are shown (e.g. "Config reloaded")
set -g display-time 1500

# Forward focus events to the application inside the pane (needed by Neovim)
set -g focus-events on

# Auto-rename windows based on current process (zsh, nvim, git, etc.)
setw -g automatic-rename on

# Prevent the shell from overriding the window name via escape sequences
set-window-option -g allow-rename off

# Start indexes at 1 (more natural on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically after closing one
set -g renumber-windows on

# Do not kill the session when the last pane/window is closed
# Allows clean detach and returning later via: t <session>
set -g detach-on-destroy off

# Disable activity notifications
setw -g monitor-activity off
set -g visual-activity off

# Allow passthrough of escape codes (needed for image.nvim kitty protocol)
set -gq allow-passthrough on

# Status bar at the top
set -g status-position bottom

# Refresh every 5 seconds (balance between clock accuracy and flicker)
set -g status-interval 1

# Tmux message style (e.g. "Config reloaded")
set -g message-style fg=white,bg=default,bold

# Transparent background (inherits terminal background)
set -g status-bg default
set -g status-fg default
set -g status-style fg=white,bg=default

# Window tab format: inactive
set -g window-status-format '#[fg=white,dim] #I:#W '

# Window tab format: active (bold, no background)
set -g window-status-current-format '#[fg=white,bold] *#I:#W '
set -g window-status-current-style ''

# Highlight tab in yellow when activity is detected
set -g window-status-activity-style fg=yellow

# window list always centered relative to terminal width (not remaining space)
set -g status-justify absolute-centre

# Show pane index + running command at the top of each pane
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=white bold],#[fg=colour238]} #{pane_index}:#{pane_current_command} "
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour238

# Detach cleanly (session stays alive, return later with: t <session>)
bind-key q detach-client

# Unbind split and new window bindings
unbind '"'
unbind %
unbind v
unbind b

# Split in current directory
bind-key v split-window -h -c '#{pane_current_path}'
bind-key b split-window -v -c '#{pane_current_path}'

# New window in current directory
bind-key c new-window -c '#{pane_current_path}'

# Unbind arrow and vim-style bindings
unbind Left
unbind Down
unbind Up
unbind Right
unbind h
unbind j
unbind k
unbind l

# Navigate between panes (vim-style + arrows)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R

# vim-tmux-navigator: use Alt+arrow (must match neovim keymaps)
set -g @vim_navigator_mapping_left  'M-Left M-h'
set -g @vim_navigator_mapping_down  'M-Down M-j'
set -g @vim_navigator_mapping_up    'M-Up M-k'
set -g @vim_navigator_mapping_right 'M-Right M-l'

# Resize panes (-r = repeatable without pressing prefix again)
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5
bind-key -r C-Left resize-pane -L 5
bind-key -r C-Down resize-pane -D 5
bind-key -r C-Up resize-pane -U 5
bind-key -r C-Right resize-pane -R 5

# Open Lazygit in a popup dialog
bind-key g display-popup -d "#{pane_current_path}" -E "lazygit"

# Open OpenCode in a popup dialog
bind-key o display-popup -d "#{pane_current_path}" -E "opencode"

# Switch session interactively with fzf
bind-key s display-popup -E 't'

# Open a floating terminal
bind-key Enter display-popup -d "#{pane_current_path}" -E "zsh"

# Quickly edit primary dotfiles
bind d display-menu -T "#[align=centre]Dotfiles" -x C -y C \
  "env"         e "display-popup -E 'nvim $DOTS/zsh/zshenv'" \
  "hammerspoon" h "display-popup -E 'nvim $DOTS/hammerspoon/init.lua'" \
  "kitty"       k "display-popup -E 'nvim $DOTS/kitty/kitty.conf'" \
  "lazygit"     l "display-popup -E 'nvim $DOTS/lazygit/config.yml'" \
  "neovim"      n "display-popup -E 'nvim $DOTS/nvim'" \
  "opencode"    o "display-popup -E 'nvim $DOTS/opencode/opencode.json'" \
  "tmux"        t "display-popup -E 'nvim $DOTS/tmux/tmux.conf'" \
  "zsh"         z "display-popup -E 'nvim $DOTS/zsh/zshrc'"

# Reload config live
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
